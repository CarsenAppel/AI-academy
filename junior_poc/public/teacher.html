<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Portal</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="custom.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 50px auto;
      padding: 30px;
      border: 2px solid #333;
      border-radius: 10px;
      background-color: #f9f9f9;
    }
    .login-container h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .form-group button:hover {
      background-color: #0056b3;
    }
    .error {
      color: #dc3545;
      text-align: center;
      margin-bottom: 15px;
    }
    .success {
      color: #28a745;
      text-align: center;
      margin-bottom: 15px;
    }
    #dashboard {
      display: none;
      max-width: 600px;
      margin: 30px auto;
    }
    .logout-btn {
      background-color: #dc3545;
      padding: 10px 20px;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .logout-btn:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>
  <div id="login-form">
    <div class="login-container">
      <h1>Teacher Portal Login</h1>
      <div id="error-message" class="error"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" required>
        </div>
        <div class="form-group">
          <button type="submit">Login</button>
        </div>
      </form>
    </div>
  </div>

  <div id="dashboard">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1>Teacher Dashboard</h1>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
    <div style="background-color: #f9f9f9; padding: 20px; border-radius: 10px;">
      <h2>Welcome, <span id="welcome-name"></span>!</h2>
      <p>Teacher portal features coming soon...</p>
      <ul>
        <li>View student chat history</li>
        <li>Monitor conversations</li>
        <li>Manage blocklist keywords</li>
        <li>Analytics and reports</li>
      </ul>
    </div>
  </div>

  <script src="teacher.js"></script>
</body>
</html>
